name: Build ubuntu 24.04 npm image

on:
  push:
    branches:
      - master
      - main
    paths:
      - "ubuntu/24.04-npm/**"
      - ".github/workflows/build-ubuntu-24.04-npm.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: loads/ubuntu
  IMAGE_TAG: 24.04-npm
  DOCKERFILE: ubuntu/24.04-npm/Dockerfile
  CONTEXT: ubuntu/24.04-npm

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
