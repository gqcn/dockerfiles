name: Build aicoding images

on:
  push:
    branches:
      - master
      - main
    paths:
      - "aicoding/cc/**"
      - "aicoding/codex/**"
      - ".github/workflows/build-aicoding-codex-latest.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: loads/cc
            tag: latest
            dockerfile: aicoding/cc/Dockerfile
            context: aicoding/cc
          - name: loads/codex
            tag: latest
            dockerfile: aicoding/codex/Dockerfile
            context: aicoding/codex

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ matrix.image.name }}:${{ matrix.image.tag }}
