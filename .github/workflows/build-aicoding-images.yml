name: Build aicoding images

on:
  push:
    branches:
      - master
      - main
    paths:
      - "aicoding/base/**"
      - "aicoding/codex/**"
      - "aicoding/claude/**"
      - ".github/workflows/build-aicoding-images.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push loads/aicoding:base-26.04
        uses: docker/build-push-action@v7
        with:
          context: aicoding/base
          file: aicoding/base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: loads/aicoding:base-26.04

  build-tools:
    runs-on: ubuntu-latest
    needs: build-base
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: loads/codex
            tag: latest
            dockerfile: aicoding/codex/Dockerfile
            context: aicoding/codex
          - name: loads/claude
            tag: latest
            dockerfile: aicoding/claude/Dockerfile
            context: aicoding/claude

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}:${{ matrix.image.tag }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ matrix.image.name }}:${{ matrix.image.tag }}
